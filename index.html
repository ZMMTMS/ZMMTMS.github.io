<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZMMTMS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="startView">
  <div class="label">How many people?</div>
  <div class="slider" id="slider">
    <div class="grab" id="grab"></div>
    <div class="val" id="val">10</div>
  </div>
  <button class="btn" id="gen">Generate</button>
</div>

<div id="simView">
  <button class="reset" id="reset">Reset</button>
  <div class="pane" id="listPane">
    <div class="pane-head" id="listHead">People</div>
    <div class="pane-body" id="list"></div>
  </div>
  <div class="pane" id="profilePane">
    <div class="pane-head">Profile</div>
    <div class="pane-body" id="profile"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
