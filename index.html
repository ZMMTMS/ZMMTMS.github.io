<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZMMTMS</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="startView">
  <div class="label">How many people?</div>
  <div class="slider" id="slider">
    <div class="grab" id="grab"></div>
    <div class="val" id="val">10</div>
  </div>
  <div class="label">Births per death</div>
  <div class="slider" id="fertSlider">
    <div class="grab" id="fertGrab"></div>
    <div class="val" id="fertVal">1.5</div>
  </div>
  <div class="label">Tick speed</div>
  <div class="speedsel" id="speedSel">
    <button class="speedopt active" data-i="0">1×</button>
    <button class="speedopt" data-i="1">2×</button>
    <button class="speedopt" data-i="2">5×</button>
    <button class="speedopt" data-i="3">10×</button>
    <button class="speedopt" data-i="4">20×</button>
  </div>
  <button class="btn" id="gen">Generate</button>
</div>

<div id="simView">
  <div class="toolbar">
    <span class="brand">ZMMTMS</span>
    <button class="tab active" id="tabDash">Dashboard</button>
    <button class="tab" id="tabLog">Log</button>
    <span class="toolbar-spacer"></span>
    <button class="reset" id="reset">Reset</button>
  </div>

  <div id="dashboard">
    <div class="pane" id="listPane">
      <div class="pane-head" id="listHead">People</div>
      <input class="search" id="search" type="text" placeholder="Search names...">
      <div class="sortbar" id="sortbar">
        <span class="sort-label">Sort</span>
        <button class="sortbtn active" data-key="name" data-label="Name">Name</button>
        <button class="sortbtn" data-key="age" data-label="Age">Age</button>
        <button class="sortbtn" data-key="money" data-label="Wealth">Wealth</button>
        <button class="sortbtn" data-key="happiness" data-label="Happy">Happy</button>
      </div>
      <div class="pane-body" id="list"></div>
    </div>

    <div id="profileArea">
      <div id="cardSlot"></div>
      <div class="worldbox" id="worldBox">
        <div class="wb-head">World</div>
        <div class="wb-time" id="wbTime">Year 0 &middot; January</div>
        <div class="wb-row"><span class="wb-key">Season</span><span class="wb-val" id="wbSeason">—</span></div>
        <div class="wb-row"><span class="wb-key">Temp</span><span class="wb-val" id="wbTemp">—</span></div>
        <div class="wb-row"><span class="wb-key">Population</span><span class="wb-val" id="wbPop">0</span></div>
        <div class="wb-row"><span class="wb-key">Births</span><span class="wb-val" id="wbBirths">0</span></div>
        <div class="wb-row"><span class="wb-key">Deaths</span><span class="wb-val" id="wbDeaths">0</span></div>
        <div class="wb-controls">
          <button class="wb-btn" id="playBtn">▶ Play</button>
          <button class="wb-btn" id="stepBtn">Step</button>
          <button class="wb-btn" id="speedBtn">1×</button>
        </div>
      </div>
    </div>

    <div class="pane" id="statsPane">
      <div class="pane-head">Statistics</div>
      <div class="pane-body" id="stats"></div>
    </div>
  </div>

  <div id="logScreen">
    <div class="pane" id="logPane">
      <div class="pane-head">Event log</div>
      <div class="pane-body" id="logBody"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@master/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script src="app.js"></script>
</body>
</html>
