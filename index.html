<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZMMTMS</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="startView">
  <div class="label">How many people?</div>
  <div class="slider" id="slider">
    <div class="grab" id="grab"></div>
    <div class="val" id="val">10</div>
  </div>
  <button class="btn" id="gen">Generate</button>
</div>

<div id="simView">
  <div class="toolbar">
    <span class="brand">ZMMTMS</span>
    <button class="tab active" id="tabDash">Dashboard</button>
    <button class="tab" id="tabLog">Log</button>
    <span class="toolbar-spacer"></span>
    <button class="reset" id="reset">Reset</button>
  </div>

  <div id="dashboard">
    <div class="pane" id="listPane">
      <div class="pane-head" id="listHead">People</div>
      <input class="search" id="search" type="text" placeholder="Search names...">
      <div class="sortbar" id="sortbar">
        <span class="sort-label">Sort</span>
        <button class="sortbtn active" data-key="name" data-label="Name">Name</button>
        <button class="sortbtn" data-key="age" data-label="Age">Age</button>
        <button class="sortbtn" data-key="money" data-label="Wealth">Wealth</button>
        <button class="sortbtn" data-key="happiness" data-label="Happy">Happy</button>
      </div>
      <div class="pane-body" id="list"></div>
    </div>
    <div id="profileArea"></div>
    <div class="pane" id="statsPane">
      <div class="pane-head">Statistics</div>
      <div class="pane-body" id="stats"></div>
    </div>
  </div>

  <div id="logScreen">
    <div class="pane" id="logPane">
      <div class="pane-head">Event log</div>
      <div class="pane-body" id="logBody"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@master/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script src="app.js"></script>
</body>
</html>
